<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Models Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
    }

    h1 {
      padding: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.2s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h1>My 3D Models</h1>

  <div class="gallery">
    <img src="./Car Key Fob Adapter.png">
    <img src="./Cat Plushie.png">
    <img src="./Ceiling Fan.png">
    <img src="./Chair Collection.png">
    <img src="./Corner Shelf.png">
    <img src="./Corsair K70 Keyboard.png">
    <img src="./Coway Air Filter Clip-on Vent.png">
    <img src="./Double Window.png">
    <img src="./Modular Tool storage Base.png">
    <img src="./Modular Tool storage Clip-on Slot.png">
    <img src="./Radiator.png">
    <img src="./Wall Cable Clip.png">
  </div>

</body>
</html>
